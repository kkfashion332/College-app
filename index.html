<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWN CLASS ROOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&family=Noto+Serif+KR:wght@400;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= SPLASH SCREEN ================= -->
    <div id="splash-screen">
        <div class="bg-radial"></div>
        <div class="vignette"></div>
        <div class="particles" id="particles"></div>
        
        <section class="hero">
            <div class="logo-wrap">
                <span class="ring"></span>
                <span class="ring"></span>
                <span class="ring"></span>
                <div class="brush-arc"></div>
                <div class="logo-inner">
                    <img src="korean-logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/288/0b1024/d4b062?text=LOGO'"/>
                    <div class="shine-wrap"><div class="shine"></div></div>
                </div>
            </div>
            <p class="greeting">안 · 녕 · 하 · 세 · 요</p>
            <h1>
                <span class="word w1">Welcome</span>
                <span class="word w2 gold-shimmer">To,</span>
                <span class="word w3">Premium</span>
                <span class="word w4 gold-shimmer">Classes.</span>
            </h1>
        </section>
    </div>

    <!-- ================= MAIN APP ================= -->
    <div id="main-app" style="display: none;">
        
        <!-- Header -->
        <header>
            <div class="header-left">
                <!-- 7 baar tap karne ke liye logo -->
                <img src="korean-logo.png" id="secret-logo" alt="Logo" onerror="this.src='https://via.placeholder.com/50/0b1024/d4b062?text=L'">
                <h2 class="brand-text gold-shimmer">OWN CLASS ROOM</h2>
            </div>
            <!-- Download Button -->
            <a href="https://drive.google.com/file/d/1rziTLqUP_jCb0PcSZED5WrSIlO_t6ZNT/view?usp=drivesdk" target="_blank" class="download-btn-top" title="Download App">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </a>
        </header>

        <!-- Top Banners Section -->
        <div class="banner-slider" id="banner-container">
            <!-- Banners JS se aayenge -->
        </div>

        <!-- Navigation Tabs -->
        <nav class="main-tabs">
            <button class="tab-btn active" data-target="classes-sec">
                <span class="tab-icon">✨</span> <span class="tab-text">Classes</span>
            </button>
            <button class="tab-btn" data-target="pdfs-sec">
                <span class="tab-icon">📚</span> <span class="tab-text">Notes</span>
            </button>
            <button class="tab-btn" data-target="announcements-sec">
                <span class="tab-icon">🔔</span> <span class="tab-text">Announcement</span>
            </button>
        </nav>

        <!-- Content Sections -->
        <main class="content-area">
            
            <!-- Classes Tab -->
            <section id="classes-sec" class="tab-content active">
                <div id="classes-list" class="grid-layout">
                    <div class="empty-msg">Loading classes...</div>
                </div>
            </section>

            <!-- PDF Tab (Vertical List) -->
            <section id="pdfs-sec" class="tab-content">
                <div id="pdfs-list" class="vertical-list">
                    <div class="empty-msg">Loading notes...</div>
                </div>
            </section>

            <!-- Announcements Tab -->
            <section id="announcements-sec" class="tab-content">
                <div id="announcements-list" class="grid-layout">
                    <div class="empty-msg">Loading announcements...</div>
                </div>
            </section>

        </main>
    </div>

    <!-- ================= PIN MODAL ================= -->
    <div id="pin-modal" class="modal">
        <div class="modal-content">
            <h3>Admin Access</h3>
            <p>Enter 4-digit PIN</p>
            <input type="password" id="pin-input" maxlength="4">
            <div class="modal-actions">
                <button id="cancel-pin" class="btn outline">Cancel</button>
                <button id="submit-pin" class="btn gold">Enter</button>
            </div>
        </div>
    </div>

    <!-- ================= ADMIN PANEL (Horizontal Layout) ================= -->
    <div id="admin-panel" style="display: none;">
        <header class="admin-header">
            <h2>Admin Dashboard</h2>
            <button id="close-admin" class="btn outline">Exit Dashboard</button>
        </header>
        
        <div class="admin-scroll-wrapper">
            <div class="admin-grid">
                
                <!-- Add Banner -->
                <div class="admin-card">
                    <h3>Manage Home Banners</h3>
                    <input type="text" id="banner-img" placeholder="Banner Image URL">
                    <input type="text" id="banner-link" placeholder="Click Link URL (Optional)">
                    <button id="btn-add-banner" class="btn gold w-100">Add Banner</button>
                    <div class="admin-list-container" id="admin-banner-list"></div>
                </div>

                <!-- Add Class -->
                <div class="admin-card">
                    <h3>Manage YouTube Classes</h3>
                    <input type="text" id="class-title" placeholder="Class Title">
                    <input type="text" id="class-url" placeholder="YouTube Video URL">
                    <input type="date" id="class-date">
                    <div class="time-flex">
                        <input type="time" id="class-start" title="Start Time">
                        <input type="time" id="class-end" title="End Time">
                    </div>
                    <button id="btn-add-class" class="btn gold w-100">Add Class</button>
                    <div class="admin-list-container" id="admin-class-list"></div>
                </div>

                <!-- Add PDF -->
                <div class="admin-card">
                    <h3>Manage Notes (PDFs)</h3>
                    <input type="text" id="pdf-title" placeholder="Notes Topic Title (e.g. Lecture 1)">
                    <input type="text" id="pdf-url" placeholder="Paste Google Drive PDF Link here">
                    <button id="btn-add-pdf" class="btn gold w-100">Add Notes</button>
                    <div class="admin-list-container" id="admin-pdf-list"></div>
                </div>

                <!-- Add Announcement -->
                <div class="admin-card">
                    <h3>Manage Announcements</h3>
                    <input type="text" id="ann-title" placeholder="Announcement Title">
                    <input type="text" id="ann-banner" placeholder="Banner Image URL (Optional)">
                    <textarea id="ann-text" rows="3" placeholder="Message details..."></textarea>
                    <button id="btn-add-ann" class="btn gold w-100">Post Announcement</button>
                    <div class="admin-list-container" id="admin-ann-list"></div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
