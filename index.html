<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Classes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= SPLASH SCREEN (Animation) ================= -->
    <div id="splash-screen">
        <div class="bg-radial"></div>
        <div class="vignette"></div>
        <div class="particles" id="particles"></div>
        
        <section class="hero">
            <div class="logo-wrap">
                <span class="ring"></span>
                <span class="ring"></span>
                <span class="ring"></span>
                <div class="brush-arc"></div>
                <div class="logo-inner">
                    <img src="korean-logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/288/0b1024/d4b062?text=LOGO'"/>
                    <div class="shine-wrap"><div class="shine"></div></div>
                </div>
            </div>
            <p class="greeting">안 · 녕 · 하 · 세 · 요</p>
            <h1>
                <span class="word w1">Welcome</span>
                <span class="word w2 gold-shimmer">To,</span>
                <span class="word w3">Premium</span>
                <span class="word w4 gold-shimmer">Classes.</span>
            </h1>
        </section>
    </div>

    <!-- ================= MAIN APP ================= -->
    <div id="main-app" style="display: none;">
        
        <!-- Header -->
        <header>
            <div class="header-left">
                <!-- 7 baar tap karne ke liye logo -->
                <img src="korean-logo.png" id="secret-logo" alt="Logo" onerror="this.src='https://via.placeholder.com/50/0b1024/d4b062?text=L'">
                <h2>My Classes</h2>
            </div>
        </header>

        <!-- Top Banners Section -->
        <div class="banner-slider" id="banner-container">
            <!-- Banners JavaScript se aayenge -->
        </div>

        <!-- Navigation Tabs -->
        <nav class="main-tabs">
            <button class="tab-btn active" data-target="classes-sec">Classes</button>
            <button class="tab-btn" data-target="pdfs-sec">Class PDF</button>
            <button class="tab-btn" data-target="announcements-sec">Announcement</button>
        </nav>

        <!-- Content Sections -->
        <main class="content-area">
            
            <!-- Classes Tab -->
            <section id="classes-sec" class="tab-content active">
                <div id="classes-list" class="grid-layout"></div>
            </section>

            <!-- PDF Tab -->
            <section id="pdfs-sec" class="tab-content">
                <div id="pdfs-list" class="grid-layout"></div>
            </section>

            <!-- Announcements Tab -->
            <section id="announcements-sec" class="tab-content">
                <div id="announcements-list" class="grid-layout"></div>
            </section>

        </main>
    </div>

    <!-- ================= PIN MODAL ================= -->
    <div id="pin-modal" class="modal">
        <div class="modal-content">
            <h3>Admin Access</h3>
            <p>Enter 4-digit PIN</p>
            <input type="password" id="pin-input" maxlength="4">
            <div class="modal-actions">
                <button id="cancel-pin" class="btn outline">Cancel</button>
                <button id="submit-pin" class="btn gold">Enter</button>
            </div>
        </div>
    </div>

    <!-- ================= ADMIN PANEL ================= -->
    <div id="admin-panel" style="display: none;">
        <header class="admin-header">
            <h2>Admin Dashboard</h2>
            <button id="close-admin" class="btn outline">Exit</button>
        </header>
        
        <div class="admin-grid">
            
            <!-- Add Banner -->
            <div class="admin-card">
                <h3>Add Banner</h3>
                <input type="text" id="banner-img" placeholder="Banner Image URL (Rectangular)">
                <input type="text" id="banner-link" placeholder="Click Link URL (Optional)">
                <button onclick="addBanner()" class="btn gold w-100">Add Banner</button>
            </div>

            <!-- Add Class -->
            <div class="admin-card">
                <h3>Add YouTube Class</h3>
                <input type="text" id="class-title" placeholder="Class Title">
                <input type="text" id="class-url" placeholder="YouTube Video URL">
                <input type="date" id="class-date">
                <div class="time-flex">
                    <input type="time" id="class-start" title="Start Time">
                    <input type="time" id="class-end" title="End Time">
                </div>
                <button onclick="addClass()" class="btn gold w-100">Add Class</button>
            </div>

            <!-- Add PDF (Images) -->
            <div class="admin-card">
                <h3>Add Class PDF (Images)</h3>
                <input type="text" id="pdf-title" placeholder="PDF/Topic Title">
                <textarea id="pdf-urls" rows="4" placeholder="Paste multiple image URLs here (separated by comma or new line)"></textarea>
                <button onclick="addPdf()" class="btn gold w-100">Add PDF</button>
            </div>

            <!-- Add Announcement -->
            <div class="admin-card">
                <h3>Add Announcement</h3>
                <input type="text" id="ann-title" placeholder="Announcement Title">
                <textarea id="ann-text" rows="3" placeholder="Message details..."></textarea>
                <button onclick="addAnnouncement()" class="btn gold w-100">Post Announcement</button>
            </div>

            <div class="admin-card full-width">
                <button onclick="clearAllData()" class="btn danger">Clear All App Data</button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
